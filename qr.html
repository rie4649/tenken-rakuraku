<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR点検</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef3f8;color:#333;text-align:center}
header{background:#1976d2;color:white;padding:35px 15px} h1{font-size:44px;margin:0} header p{font-size:26px} h2{font-size:52px;margin:35px 20px} .box{background:white;margin:25px;padding:28px;border-radius:18px;font-size:30px;font-weight:bold}
button{width:90%;padding:28px;margin:16px auto;display:block;border:none;border-radius:18px;font-size:32px;font-weight:bold;color:white}
.morning{background:#2196f3}
.afternoon{background:#7e57c2}
.back{background:#666}
.done{background:#4caf50;color:white}
</style>
</head>

<body>

<header>
  <h1>点検ラクラク</h1>
  <p>車両専用 点検ページ</p>
</header>

<h2 id="vehicleTitle">車両</h2>

<div class="box" id="message">
  点検する項目を選んでください
</div>

<button class="morning" onclick="checkVehicle('morning')">
  午前 点検済みにする
</button>

<button class="afternoon" onclick="checkVehicle('afternoon')">
  午後 点検済みにする
</button>

<button class="back" onclick="location.href='index.html'">
  一覧へ戻る
</button>

<script>
const year = 2026;
const month = 7;

function getVehicle(){
  const params = new URLSearchParams(window.location.search);
  return params.get("vehicle") || "車両";
}

function todayDay(){
  return new Date().getDate();
}

function storageKey(day){
  return "tenken_" + year + "_" + month + "_" + day; }

function getData(day){
  return JSON.parse(localStorage.getItem(storageKey(day))) || {}; }

function saveData(day, data){
  localStorage.setItem(storageKey(day), JSON.stringify(data)); }

function checkVehicle(type){
  const vehicle = getVehicle();
  const day = todayDay();
  const data = getData(day);

  if(!data[vehicle]){
    data[vehicle] = {};
  }

  data[vehicle][type] = true;
  saveData(day, data);

  showStatus();
}

function showStatus(){
  const vehicle = getVehicle();
  const day = todayDay();
  const data = getData(day);
  const item = data[vehicle] || {};

  document.getElementById("vehicleTitle").textContent = vehicle;

  const message = document.getElementById("message");
  message.classList.remove("done");

  if(item.morning && item.afternoon){
    message.textContent = "午前・午後 点検済みです";
    message.classList.add("done");
  }else if(item.morning){
    message.textContent = "午前 点検済みです";
    message.classList.add("done");
  }else if(item.afternoon){
    message.textContent = "午後 点検済みです";
    message.classList.add("done");
  }else{
    message.textContent = "点検する項目を選んでください";
  }
}

document.addEventListener("DOMContentLoaded", showStatus); </script>

</body>
</html>=
