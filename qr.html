<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点検ラクラク QR点検</title>
<link rel="stylesheet" href="style.css"> <style> .qrBox{
  background:white;
  margin:22px auto;
  padding:24px;
  border-radius:18px;
  max-width:560px;
  font-size:24px;
  font-weight:bold;
}
.qrBtn{
  width:90%;
  max-width:560px;
  padding:26px;
  margin:16px auto;
  display:block;
  border:none;
  border-radius:18px;
  font-size:28px;
  font-weight:bold;
  color:white;
}
.morning{background:#2196f3}
.afternoon{background:#7e57c2}
.back{background:#555}
.doneBox{background:#4caf50;color:white}
.vehicleTitle{
  font-size:44px;
  margin:28px 10px;
  color:#222;
}
</style>
</head>

<body>

<header>
  <h1>点検ラクラク</h1>
  <p>車両専用 点検ページ</p>
</header>

<main>
  <h2 id="vehicleTitle" class="vehicleTitle">車両</h2>

  <div id="message" class="qrBox">
    点検する項目を選んでください
  </div>

  <button class="qrBtn morning" onclick="saveCheck('morning')">
    午前 点検済みにする
  </button>

  <button class="qrBtn afternoon" onclick="saveCheck('afternoon')">
    午後 点検済みにする
  </button>

  <button class="qrBtn back" onclick="location.href='index.html'">
    一覧へ戻る
  </button>
</main>

<script>
const TENKEN_YEAR = 2026;
const TENKEN_MONTH = 7;

function getVehicle(){
  const params = new URLSearchParams(window.location.search);
  return params.get("vehicle") || "車両未指定";
}

function getTodayDay(){
  return new Date().getDate();
}

function makeKey(day){
  return "tenken_" + TENKEN_YEAR + "_" + TENKEN_MONTH + "_" + day; }

function loadDayData(day){
  const saved = localStorage.getItem(makeKey(day));
  if(!saved) return {};
  try{
    return JSON.parse(saved);
  }catch(e){
    return {};
  }
}

function saveDayData(day, data){
  localStorage.setItem(makeKey(day), JSON.stringify(data)); }

function saveCheck(type){
  const vehicle = getVehicle();
  const day = getTodayDay();
  const data = loadDayData(day);

  if(!data[vehicle]){
    data[vehicle] = {};
  }

  data[vehicle][type] = true;
  saveDayData(day, data);
  showStatus();
}

function showStatus(){
  const vehicle = getVehicle();
  const day = getTodayDay();
  const data = loadDayData(day);
  const record = data[vehicle] || {};

  document.getElementById("vehicleTitle").textContent = vehicle;

  const message = document.getElementById("message");
  message.classList.remove("doneBox");

  if(record.morning && record.afternoon){
    message.textContent = "午前・午後 点検済みです";
    message.classList.add("doneBox");
  }else if(record.morning){
    message.textContent = "午前 点検済みです";
    message.classList.add("doneBox");
  }else if(record.afternoon){
    message.textContent = "午後 点検済みです";
    message.classList.add("doneBox");
  }else{
    message.textContent = "点検する項目を選んでください";
  }
}

document.addEventListener("DOMContentLoaded", showStatus); </script>

</body>
</html>=
