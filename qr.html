<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR点検</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef3f8;
  color:#333;
  text-align:center;
}
header{
  background:#1976d2;
  color:white;
  padding:35px 15px;
}
h1{
  font-size:44px;
}
h2{
  font-size:46px;
  margin:35px 0 20px;
}
button{
  width:90%;
  padding:25px;
  margin:15px auto;
  display:block;
  border:none;
  border-radius:18px;
  font-size:30px;
  font-weight:bold;
  color:white;
}
.morning{background:#2196f3;}
.afternoon{background:#7e57c2;}
.back{background:#666;}
.box{
  background:white;
  margin:25px;
  padding:25px;
  border-radius:18px;
  font-size:28px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <h1>🚛 QR点検</h1>
  <p>車両専用 点検ページ</p>
</header>

<h2 id="vehicleTitle">車両</h2>

<div class="box" id="message">
  点検する項目を選んでください
</div>

<button class="morning" onclick="checkVehicle('morning')">
  ☀ 午前 点検済みにする
</button>

<button class="afternoon" onclick="checkVehicle('afternoon')">
  🌙 午後 点検済みにする
</button>

<button class="back" onclick="location.href='index.html'">
  🏠 一覧へ戻る
</button>

<script>
const params = new URLSearchParams(window.location.search);
const vehicle = params.get("vehicle") || "車両未指定";

const year = 2026;
const month = 7;
const day = 1;

document.getElementById("vehicleTitle").textContent = "🚛 " + vehicle;

function storageKey(){
  return "tenken_" + year + "_" + month + "_" + day;
}

function getData(){
  return JSON.parse(localStorage.getItem(storageKey())) || {};
}

function saveData(data){
  localStorage.setItem(storageKey(), JSON.stringify(data));
}

function checkVehicle(period){
  const data = getData();

  if(!data[vehicle]){
    data[vehicle] = {};
  }

  data[vehicle][period] = true;
  saveData(data);

  const label = period === "morning" ? "午前" : "午後";

  document.getElementById("message").innerHTML =
    "✅ " + vehicle + "<br>" + label + "点検を完了しました";
}
</script>

</body>
</html>
