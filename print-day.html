<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日別 点検表PDF</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#eef3f8;color:#333}
.wrap{max-width:900px;margin:auto;background:white;padding:24px}
h1{text-align:center;font-size:30px;margin:10px 0}
.summary{font-size:20px;font-weight:bold;line-height:1.8;margin:18px 0;padding:14px;background:#f3f7ff;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:18px}
th{background:#1976d2;color:white;padding:10px}
td{border:1px solid #ccc;padding:10px;text-align:center}
td:first-child{text-align:left;font-weight:bold}
.done{color:#0a9f20;font-weight:bold}
.not{color:#d60000;font-weight:bold}
.printBtn{display:block;margin:20px auto;padding:14px 30px;font-size:20px;border:none;border-radius:12px;background:#1976d2;color:white;font-weight:bold}
.backBtn{display:block;margin:10px auto;padding:12px 25px;font-size:18px;border:none;border-radius:12px;background:#555;color:white}
@media print{
  body{background:white}
  .wrap{max-width:none;padding:10mm}
  .printBtn,.backBtn{display:none}
}
</style>
</head>

<body>
<div class="wrap">

<button class="printBtn" onclick="window.print()">この日をPDF保存 / 印刷</button>
<button class="backBtn" onclick="location.href='index.html'">戻る</button>

<h1 id="title">点検表</h1>

<div class="summary" id="summary"></div>

<table>
<thead>
<tr>
  <th>車両</th>
  <th>午前</th>
  <th>午後</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

<script>
const vehicles = [
 "340","567","アームロール","いすゞ25t","265","25tセルフ",
 "6ヒアロング","5t","3tワイド","576","440","青パッカー",
 "5ヒア","620","ヒノ8t","ツートン","3tパッカー","白パッカー",
 "3ヒア","640","950","2.9","ヒノ","10t①",
 "230","8t","セルフ","3t","新10ｔ","三菱ワイド","軽トラ"
];

const YEAR = 2026;
const MONTH = 7;

function getDay(){
  const params = new URLSearchParams(location.search);
  return Number(params.get("day")) || new Date().getDate();
}

function key(day){
  return "tenken_" + YEAR + "_" + MONTH + "_" + day;
}

function getData(day){
  return JSON.parse(localStorage.getItem(key(day)) || "{}");
}

function status(done){
  return done
    ? "<span class='done'>🟢 確認済</span>"
    : "<span class='not'>🔴 未確認</span>";
}

function render(){
  const day = getDay();
  const data = getData(day);

  let morningCount = 0;
  let afternoonCount = 0;

  vehicles.forEach(v=>{
    const r = data[v] || {};
    if(r.morning) morningCount++;
    if(r.afternoon) afternoonCount++;
  });

  document.getElementById("title").textContent =
    "🚛 点検ラクラク　" + YEAR + "年" + MONTH + "月" + day + "日 点検表";

  document.getElementById("summary").innerHTML =
    "🟢 午前確認済 " + morningCount + "台 / 🔴 未確認 " + (vehicles.length - morningCount) + "台<br>" +
    "🟢 午後確認済 " + afternoonCount + "台 / 🔴 未確認 " + (vehicles.length - afternoonCount) + "台";

  const list = document.getElementById("list");
  list.innerHTML = "";

  vehicles.forEach(v=>{
    const r = data[v] || {};
    const tr = document.createElement("tr");
    tr.innerHTML =
      "<td>" + v + "</td>" +
      "<td>" + status(r.morning) + "</td>" +
      "<td>" + status(r.afternoon) + "</td>";
    list.appendChild(tr);
  });
}

render();
</script>

</body>
</html>
