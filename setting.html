<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点検ラクラク 設定</title>
<link rel="stylesheet" href="style.css">
<style>
.settingBox{
  background:white;
  max-width:760px;
  margin:18px auto;
  padding:18px;
  border-radius:16px;
  box-shadow:0 2px 8px rgba(0,0,0,.12);
  text-align:left;
}
.settingBox h2{font-size:24px;margin:0 0 14px}
.settingBtn{
  width:100%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:14px;
  background:#1976d2;
  color:white;
  font-size:20px;
  font-weight:bold;
}
.dangerBtn{background:#d32f2f}
input,select{
  width:100%;
  padding:14px;
  margin:8px 0;
  font-size:18px;
  border-radius:10px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
.infoText{font-size:18px;line-height:1.8}
</style>
</head>

<body>

<header>
  <h1>⚙️ 点検ラクラク設定</h1>
  <p>Version 1.0</p>
</header>

<main>

<div class="settingBox">
  <h2>📅 月設定</h2>
  <label>年</label>
  <input id="yearInput" type="number" value="2026">

  <label>月</label>
  <select id="monthInput">
    <option value="1">1月</option>
    <option value="2">2月</option>
    <option value="3">3月</option>
    <option value="4">4月</option>
    <option value="5">5月</option>
    <option value="6">6月</option>
    <option value="7" selected>7月</option>
    <option value="8">8月</option>
    <option value="9">9月</option>
    <option value="10">10月</option>
    <option value="11">11月</option>
    <option value="12">12月</option>
  </select>

  <button class="settingBtn" onclick="saveMonthSetting()">月設定を保存</button>
</div>

<div class="settingBox">
  <h2>🚛 車両管理</h2>

  <label>追加する車両名</label>
  <input id="addVehicleInput" placeholder="例：新しい車両名">
  <button class="settingBtn" onclick="addVehicle()">➕ 車両追加</button>

  <label>変更前の車両名</label>
  <input id="oldVehicleInput" placeholder="例：340">

  <label>変更後の車両名</label>
  <input id="newVehicleInput" placeholder="例：340号車">
  <button class="settingBtn" onclick="renameVehicle()">✏️ 車両名変更</button>

  <label>削除する車両名</label>
  <input id="deleteVehicleInput" placeholder="例：340">
  <button class="settingBtn dangerBtn" onclick="deleteVehicle()">🗑 車両削除</button>
</div>

<div class="settingBox">
  <h2>📄 PDF</h2>
  <button class="settingBtn" onclick="location.href='print-day.html'">📄 今日をPDF</button>
  <button class="settingBtn" onclick="location.href='index.html'">📅 月間一覧からPDF</button>
</div>

<div class="settingBox">
  <h2>🖨 QR</h2>
  <button class="settingBtn" onclick="location.href='qr-print.html'">QRコード再印刷</button>
</div>

<div class="settingBox">
  <h2>💾 データ</h2>
  <button class="settingBtn dangerBtn" onclick="resetData()">保存データリセット</button>
</div>

<div class="settingBox">
  <h2>🧪 開発中</h2>
  <div class="infoText">
    □ Googleスプレッドシート連携<br>
    □ 担当者名<br>
    □ 点検時間記録<br>
    □ 点検漏れアラーム<br>
    □ バックアップ
  </div>
</div>

<button class="backBtn" onclick="location.href='index.html'">🏠 ホームへ戻る</button>

</main>

<script>
const defaultVehicles = [
 "340","567","アームロール","いすゞ25t","265","25tセルフ",
 "6ヒアロング","5t","3tワイド","576","440","青パッカー",
 "5ヒア","620","ヒノ8t","ツートン","3tパッカー","白パッカー",
 "3ヒア","640","950","2.9","ヒノ","10t①",
 "230","8t","セルフ","3t","10t②","三菱ワイド","軽トラ"
];

function getVehicles(){
  return JSON.parse(localStorage.getItem("tenken_vehicles") || JSON.stringify(defaultVehicles));
}

function saveVehicles(list){
  localStorage.setItem("tenken_vehicles", JSON.stringify(list));
}

function saveMonthSetting(){
  const year = document.getElementById("yearInput").value;
  const month = document.getElementById("monthInput").value;

  localStorage.setItem("tenken_year", year);
  localStorage.setItem("tenken_month", month);

  alert("月設定を保存しました");
}

function addVehicle(){
  const name = document.getElementById("addVehicleInput").value.trim();
  if(!name){
    alert("車両名を入力してください");
    return;
  }

  const list = getVehicles();
  if(list.includes(name)){
    alert("すでに登録されています");
    return;
  }

  list.push(name);
  saveVehicles(list);
  alert("車両を追加しました");
}

function renameVehicle(){
  const oldName = document.getElementById("oldVehicleInput").value.trim();
  const newName = document.getElementById("newVehicleInput").value.trim();

  if(!oldName || !newName){
    alert("変更前と変更後を入力してください");
    return;
  }

  const list = getVehicles();
  const index = list.indexOf(oldName);

  if(index === -1){
    alert("変更前の車両名が見つかりません");
    return;
  }

  list[index] = newName;
  saveVehicles(list);
  alert("車両名を変更しました");
}

function deleteVehicle(){
  const name = document.getElementById("deleteVehicleInput").value.trim();
  if(!name){
    alert("削除する車両名を入力してください");
    return;
  }

  if(!confirm(name + " を削除しますか？")){
    return;
  }

  const list = getVehicles().filter(v => v !== name);
  saveVehicles(list);
  alert("車両を削除しました");
}

function resetData(){
  if(!confirm("保存データをリセットしますか？")){
    return;
  }

  Object.keys(localStorage).forEach(key=>{
    if(key.startsWith("tenken_2026_") || key.startsWith("tenken_")){
      if(key !== "tenken_vehicles"){
        localStorage.removeItem(key);
      }
    }
  });

  alert("保存データをリセットしました");
}

window.onload = function(){
  const savedYear = localStorage.getItem("tenken_year") || "2026";
  const savedMonth = localStorage.getItem("tenken_month") || "7";

  document.getElementById("yearInput").value = savedYear;
  document.getElementById("monthInput").value = savedMonth;
};
</script>

</body>
</html>
