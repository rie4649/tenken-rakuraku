<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点検ラクラク 設定</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<header>
  <h1>⚙ 設定</h1>
  <p>車両・担当者の編集</p>
</header>

<main>
<section class="screen active">

  <button class="backBtn" onclick="location.href='index.html'">戻る</button>

  <div class="countBox">
    <h2>🚚 登録車両</h2>
    <input id="addVehicleInput" placeholder="車両名を入力" style="font-size:22px;padding:14px;width:70%;">
    <button class="menuBtn" onclick="addVehicle()">追加</button>
    <div id="vehicleList"></div>
  </div>

  <div class="countBox">
    <h2>👤 担当者</h2>
    <input id="addStaffInput" placeholder="担当者名を入力" style="font-size:22px;padding:14px;width:70%;">
    <button class="menuBtn" onclick="addStaff()">追加</button>
    <div id="staffList"></div>
  </div>

</section>
</main>

<script>
const defaultVehicles = [
"340","567","アームロール","いすゞ25t","265","25tセルフ",
"6ヒアロング","5t","3tワイド","576","440","青パッカー",
"5ヒア","620","ヒノ8t","ツートン","3tパッカー","白パッカー",
"3ヒア","640","950","2.9","ヒノ","10t①",
"230","8t","セルフ","3t","10t②","三菱ワイド","軽トラ"
];

const defaultStaff = [
"未選択","社長","常務","細田典良","春原誠","高橋由幸","西澤文彦",
"五十嵐雅文","赤池秀幸","金子政司","大日方広義","金井正美",
"清水広之","桑野恵","上野雅宏","中村雅志","深澤卓也",
"仙石寛崇","上野雅也","塩川公明","松下伊織","水野浩",
"伊部豊","山田由一","池田袈裟人","菊池茂義"
];

function getVehicles(){
  return JSON.parse(localStorage.getItem("tenken_vehicles") || JSON.stringify(defaultVehicles));
}

function saveVehicles(list){
  localStorage.setItem("tenken_vehicles", JSON.stringify(list));
  renderVehicles();
}

function getStaff(){
  return JSON.parse(localStorage.getItem("tenken_staff") || JSON.stringify(defaultStaff));
}

function saveStaff(list){
  localStorage.setItem("tenken_staff", JSON.stringify(list));
  renderStaff();
}

function renderVehicles(){
  const box = document.getElementById("vehicleList");
  const list = getVehicles();
  box.innerHTML = "";

  list.forEach((name, i)=>{
    const row = document.createElement("div");
    row.style.cssText = "display:grid;grid-template-columns:1fr 80px 80px;gap:10px;align-items:center;border-bottom:1px solid #ddd;padding:14px;font-size:24px;";
    row.innerHTML = `
      <div>${i+1}. ${name}</div>
      <button onclick="renameVehicle('${name}')" style="font-size:24px;padding:12px;background:#1976d2;color:white;border:none;border-radius:10px;">✏️</button>
      <button onclick="deleteVehicle('${name}')" style="font-size:24px;padding:12px;background:#d32f2f;color:white;border:none;border-radius:10px;">🗑️</button>
    `;
    box.appendChild(row);
  });
}

function addVehicle(){
  const input = document.getElementById("addVehicleInput");
  const name = input.value.trim();
  if(!name) return alert("車両名を入力してください");

  const list = getVehicles();
  if(list.includes(name)) return alert("すでに登録されています");

  list.push(name);
  saveVehicles(list);
  input.value = "";
}

function renameVehicle(oldName){
  const newName = prompt("新しい車両名を入力してください", oldName);
  if(!newName || !newName.trim()) return;

  const list = getVehicles().map(v => v === oldName ? newName.trim() : v);
  saveVehicles(list);
}

function deleteVehicle(name){
  if(!confirm(name + " を削除しますか？")) return;
  const list = getVehicles().filter(v => v !== name);
  saveVehicles(list);
}

function renderStaff(){
  const box = document.getElementById("staffList");
  const list = getStaff();
  box.innerHTML = "";

  list.forEach((name, i)=>{
    const row = document.createElement("div");
    row.style.cssText = "display:grid;grid-template-columns:1fr 80px 80px;gap:10px;align-items:center;border-bottom:1px solid #ddd;padding:14px;font-size:24px;";
    row.innerHTML = `
      <div>${i+1}. ${name}</div>
      <button onclick="renameStaff('${name}')" style="font-size:24px;padding:12px;background:#1976d2;color:white;border:none;border-radius:10px;">✏️</button>
      <button onclick="deleteStaff('${name}')" style="font-size:24px;padding:12px;background:#d32f2f;color:white;border:none;border-radius:10px;">🗑️</button>
    `;
    box.appendChild(row);
  });
}

function addStaff(){
  const input = document.getElementById("addStaffInput");
  const name = input.value.trim();
  if(!name) return alert("担当者名を入力してください");

  const list = getStaff();
  if(list.includes(name)) return alert("すでに登録されています");

  list.push(name);
  saveStaff(list);
  input.value = "";
}

function renameStaff(oldName){
  if(oldName === "未選択") return alert("未選択は変更できません");

  const newName = prompt("新しい担当者名を入力してください", oldName);
  if(!newName || !newName.trim()) return;

  const list = getStaff().map(v => v === oldName ? newName.trim() : v);
  saveStaff(list);
}

function deleteStaff(name){
  if(name === "未選択") return alert("未選択は削除できません");
  if(!confirm(name + " を削除しますか？")) return;

  const list = getStaff().filter(v => v !== name);
  saveStaff(list);
}

window.onload = function(){
  renderVehicles();
  renderStaff();
};
</script>

</body>
</html>
