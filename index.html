<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点検ラクラク</title>
<link rel="stylesheet" href="style.css"> </head>

<body>

<header>
  <h1>🚛 点検ラクラク</h1>
  <p>2026年7月 点検表</p>
</header>

<main>

<section id="home" class="screen active">
  <button class="menuBtn" onclick="showScreen('today')">今日の点検</button>
  <button class="menuBtn" onclick="showScreen('month')">月間一覧</button>
  <button class="menuBtn" onclick="location.href='qr-print.html'">QRコード印刷</button>
</section>

<section id="today" class="screen">
  <h2 id="dayTitle">☀ 今日の点検</h2>

  <div class="summaryBox">
    <div>午前：<span id="morningCount">0</span>/31台</div>
    <div>午後：<span id="afternoonCount">0</span>/31台</div>
  </div>

  <div class="tableHeader">
    <span>車両名</span>
    <span>午前</span>
    <span>午後</span>
  </div>

  <div id="todayList"></div>

  <button class="saveBtn" onclick="saveToday()">確認して保存</button>
  <button class="backBtn" onclick="showScreen('home')">戻る</button>
</section>

<section id="month" class="screen">
  <h2>7月 月間一覧</h2>

  <div class="tableHeader">
    <span>日付</span>
    <span>午前</span>
    <span>午後</span>
  </div>

  <div id="monthList"></div>

  <button class="backBtn" onclick="showScreen('home')">戻る</button>
</section>

</main>

<script>
const vehicles = [
  "340","567","アームロール","いすゞ25t","265","25tセルフ",
  "6ヒアロング","5t","3tワイド","576","440","青パッカー",
  "5ヒア","620","ヒノ8t","ツートン","3tパッカー","白パッカー",
  "3ヒア","640","950","2.9","ヒノ","10t①",
  "230","8t","セルフ","3t","10t②","三菱ワイド","軽トラ"
];

const YEAR = 2026;
const MONTH = 7;

function todayDay(){
  return new Date().getDate();
}

function key(day){
  return "tenken_" + YEAR + "_" + MONTH + "_" + day; }

function getData(day){
  return JSON.parse(localStorage.getItem(key(day)) || "{}"); }

function saveData(day, data){
  localStorage.setItem(key(day), JSON.stringify(data)); }

function showScreen(id){
  document.querySelectorAll(".screen").forEach(function(s){
    s.classList.remove("active");
  });

  document.getElementById(id).classList.add("active");

  renderToday();
  renderMonth();
}

function renderToday(){
  const day = todayDay();
  const data = getData(day);
  const list = document.getElementById("todayList");

  list.innerHTML = "";

  let morningCount = 0;
  let afternoonCount = 0;

  vehicles.forEach(function(vehicle){
    const record = data[vehicle] || {};

    if(record.morning) morningCount++;
    if(record.afternoon) afternoonCount++;

    const row = document.createElement("div");
    row.className = "checkRow";

    row.innerHTML =
      "<div class='vehicleName'>" + vehicle + "</div>" +
      "<input class='checkBox morningCheck' type='checkbox' data-vehicle='" + vehicle + "' " + (record.morning ? "checked" : "") + ">" +
      "<input class='checkBox afternoonCheck' type='checkbox' data-vehicle='" + vehicle + "' " + (record.afternoon ? "checked" : "") + ">";

    list.appendChild(row);
  });

  document.getElementById("morningCount").textContent = morningCount;
  document.getElementById("afternoonCount").textContent = afternoonCount;
  document.getElementById("dayTitle").textContent = "☀ " + MONTH + "月" + day + "日の点検";
}

function saveToday(){
  const day = todayDay();
  const data = getData(day);

  vehicles.forEach(function(vehicle){
    const morning = document.querySelector(".morningCheck[data-vehicle='" + vehicle + "']");
    const afternoon = document.querySelector(".afternoonCheck[data-vehicle='" + vehicle + "']");

    data[vehicle] = {
      morning: morning.checked,
      afternoon: afternoon.checked
    };
  });

  saveData(day, data);
  renderToday();
  renderMonth();

  alert("保存しました");
}

function renderMonth(){
  const list = document.getElementById("monthList");
  list.innerHTML = "";

  for(let day = 1; day <= 31; day++){
    const data = getData(day);

    let morningCount = 0;
    let afternoonCount = 0;

    vehicles.forEach(function(vehicle){
      const record = data[vehicle] || {};
      if(record.morning) morningCount++;
      if(record.afternoon) afternoonCount++;
    });

    const row = document.createElement("div");
    row.className = "monthRow";

    row.innerHTML =
      "<span>" + day + "日</span>" +
      "<span>" + morningCount + "/" + vehicles.length + "</span>" +
      "<span>" + afternoonCount + "/" + vehicles.length + "</span>";

    list.appendChild(row);
  }
}

document.addEventListener("DOMContentLoaded", function(){
  renderToday();
  renderMonth();
});
</script>

</body>
</html>=
