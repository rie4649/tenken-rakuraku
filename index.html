<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点検ラクラク</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="style.css?v=40">
<style>
#installBtn{
display:none;position:fixed;top:14px;right:14px;z-index:9999;
background:#2563eb;color:#fff;border:none;border-radius:999px;
padding:10px 18px;font-size:14px;font-weight:bold;cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.25);
}
#installHelp{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
z-index:10000;align-items:center;justify-content:center;padding:20px;
}
#installHelp .box{background:#fff;border-radius:14px;padding:22px;max-width:340px;width:100%;text-align:left}
#installHelp h3{margin:0 0 10px;color:#2563eb}
#installHelp p{font-size:13px;color:#555;line-height:1.7}
#installHelp button{
margin-top:14px;width:100%;padding:10px;border:none;border-radius:8px;
background:#ddd;font-weight:bold;cursor:pointer;font-size:14px;
}
</style>
</head>
<body>

<button id="installBtn">📲 アプリを追加</button>
<div id="installHelp">
<div class="box">
<h3>アプリとして追加する方法</h3>
<p id="installHelpText"></p>
<button id="closeInstallHelp">閉じる</button>
</div>
</div>

<header>
<h1>🚚 点検ラクラク</h1>
<p>2026年7月 点検表</p>
</header>
<main>
<!-- ホーム -->
<section id="home" class="screen active">
<div id="shakenWarning" style="display:none;background:#fff3cd;border:2px solid #ff9800;color:#8a5300;padding:14px;border-radius:12px;margin:14px auto;max-width:760px;font-size:16px;text-align:left;line-height:1.6;"></div>
<button class="menuBtn" onclick="showScreen('today')">今日の点検</button>
<button class="menuBtn" onclick="showScreen('month')">月間一覧</button>
<button class="menuBtn" onclick="location.href='search.html'">🔍 点検データ検索</button>
<button class="menuBtn" onclick="location.href='report-list.html'">🛠 不具合報告一覧</button>
<button class="menuBtn" onclick="location.href='shaken.html'">🚗 車検満了日 一覧</button>
<button class="menuBtn" onclick="location.href='qr-print.html?v=116'">QRコード印刷</button>
<button class="menuBtn" onclick="location.href='setting.html?v=101'">⚙ 設定</button>
</section>

<!-- 今日の点検 -->
<section id="today" class="screen">
<h2 id="dayTitle">☀ 今日の点検</h2>
<div class="countBox">
<div>午前：<span id="morningCount">0</span>/<span id="totalCount1">31</span>台</div>
<div>午後：<span id="afternoonCount">0</span>/<span id="totalCount2">31</span>台</div>
</div>
<div class="tableHeader">
<span>車両名</span>
<span>午前</span>
<span>午後</span>
</div>
<div id="todayList"></div>
<button class="backBtn" onclick="showScreen('home')">戻る</button>
</section>

<!-- 月間一覧 -->
<section id="month" class="screen">
<h2>月間一覧</h2>
<button class="menuBtn" onclick="window.print()">PDF印刷</button>
<button class="menuBtn" onclick="exportMonthCSV()">📊 CSV保存</button>
<button class="menuBtn" onclick="location.href='print-month.html?year='+getViewYear()+'&month='+getViewMonth()">🖨 全車両1ヶ月分を印刷用に開く</button>
<div class="tableHeader">
<span>日付</span>
<span>午前</span>
<span>午後</span>
</div>
<div id="monthList"></div>
<button class="backBtn" onclick="showScreen('home')">戻る</button>
</section>
</main>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js"></script>
<script src="script.js?v=201"></script>

<script>
/* ===== アプリとして追加(PWAインストール) ===== */
if("serviceWorker" in navigator){
window.addEventListener("load", ()=>{
navigator.serviceWorker.register("service-worker.js").catch(()=>{});
});
}

let deferredInstallPrompt = null;
const installBtn = document.getElementById("installBtn");
let autoPromptTried = false;

async function tryAutoPrompt(){
if(autoPromptTried || !deferredInstallPrompt) return;
autoPromptTried = true;
try{
deferredInstallPrompt.prompt();
const choice = await deferredInstallPrompt.userChoice;
if(choice.outcome === "accepted"){ installBtn.style.display = "none"; }
deferredInstallPrompt = null;
}catch(err){ console.error("auto install prompt failed", err); }
}

window.addEventListener("beforeinstallprompt", (e)=>{
e.preventDefault();
deferredInstallPrompt = e;
installBtn.style.display = "inline-flex";
tryAutoPrompt();
});

window.addEventListener("appinstalled", ()=>{
installBtn.style.display = "none";
deferredInstallPrompt = null;
});

function detectManualInstallText(){
const ua = navigator.userAgent;
const isMac = /Macintosh/.test(ua);
const isWin = /Windows/.test(ua);
const isSafari = /Safari/.test(ua) && !/Chrome|Chromium|Edg/.test(ua);
if(isSafari && isMac) return "Safariのメニューバーで「ファイル」→「Dockに追加」を選んでください。(Safari 17以降)";
if(isSafari) return "共有ボタン(□に↑のアイコン)をタップし、「ホーム画面に追加」を選んでください。";
if(isWin || isMac) return "アドレスバー右端の「インストール」アイコンをクリックしてください。表示されない場合は、ブラウザ右上のメニュー(⋮)から「アプリをインストール」を選んでください。";
return "ブラウザのメニューから「ホーム画面に追加」または「インストール」を選んでください。";
}

installBtn.addEventListener("click", async ()=>{
if(deferredInstallPrompt){
deferredInstallPrompt.prompt();
const choice = await deferredInstallPrompt.userChoice;
deferredInstallPrompt = null;
if(choice.outcome === "accepted") installBtn.style.display = "none";
return;
}
document.getElementById("installHelpText").textContent = detectManualInstallText();
document.getElementById("installHelp").style.display = "flex";
});

document.getElementById("closeInstallHelp").onclick = ()=>{
document.getElementById("installHelp").style.display = "none";
};

if(!("onbeforeinstallprompt" in window)){
installBtn.style.display = "inline-flex";
}
</script>
<div id="screensaverOverlay" style="display:none;position:fixed;inset:0;z-index:99999;background:#000;">
<iframe id="screensaverFrame" style="width:100%;height:100%;border:none;pointer-events:none;" src=""></iframe>
</div>

<script>
(function(){
let wakeLock = null;
async function requestWakeLock(){
try{
wakeLock = await navigator.wakeLock.request("screen");
wakeLock.addEventListener("release", function(){
wakeLock = null;
});
}catch(e){
console.log("wakeLock error", e);
}
}
requestWakeLock();
document.addEventListener("visibilitychange", function(){
if(document.visibilityState === "visible" && wakeLock === null){
requestWakeLock();
}
});
const IDLE_LIMIT_MS = 30 * 60 * 1000;
const SLIDE_INTERVAL_MS = 10 * 1000;
const SCREENS = [
  "https://rie4649.github.io/shanai-keijiban/",
  "https://rie4649.github.io/buji-buihan/",
  "https://rie4649.github.io/gaichu-schedule/"
];

let lastActivity = Date.now();
let screensaverOn = false;
let slideIndex = 0;
let slideTimer = null;

function resetActivity(){
lastActivity = Date.now();
}

["touchstart","mousedown","keydown","click"].forEach(function(evt){
document.addEventListener(evt, function(e){
if(screensaverOn){
exitScreensaver();
}else{
resetActivity();
}
}, true);
});

function showSlide(){
const frame = document.getElementById("screensaverFrame");
frame.src = SCREENS[slideIndex];
slideIndex = (slideIndex + 1) % SCREENS.length;
}

function enterScreensaver(){
screensaverOn = true;
slideIndex = 0;
showSlide();
document.getElementById("screensaverOverlay").style.display = "block";
slideTimer = setInterval(showSlide, SLIDE_INTERVAL_MS);
}

function exitScreensaver(){
screensaverOn = false;
document.getElementById("screensaverOverlay").style.display = "none";
document.getElementById("screensaverFrame").src = "";
if(slideTimer){clearInterval(slideTimer);slideTimer=null;}
resetActivity();
}

setInterval(function(){
if(!screensaverOn && Date.now() - lastActivity >= IDLE_LIMIT_MS){
enterScreensaver();
}
}, 10000);
})();
</script>
</body>
</html>
