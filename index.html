<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>点検ラクラク</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🚛 点検ラクラク</h1>
  <p id="todayText"></p>
</header>

<main>

  <section id="home" class="screen active">
    <button class="menuBtn" onclick="showScreen('today')">☀ 今日の点検</button>
    <button class="menuBtn" onclick="showScreen('month')">📅 月間点検表</button>
    <button class="menuBtn" onclick="showScreen('qr')">📷 QR点検</button>
    <button class="menuBtn" onclick="showScreen('manage')">⚙ 車両管理</button>
  </section>

  <section id="today" class="screen">
    <h2>☀ 今日の点検</h2>

    <h3>午前</h3>
    <div id="morningList"></div>

    <h3>午後</h3>
    <div id="afternoonList"></div>

    <button class="backBtn" onclick="showScreen('home')">🏠 ホームへ戻る</button>
  </section>

  <section id="month" class="screen">
    <h2>📅 月間点検表</h2>
    <div id="monthList"></div>
    <button class="printBtn" onclick="window.print()">🖨 印刷する</button>
    <button class="backBtn" onclick="showScreen('home')">🏠 ホームへ戻る</button>
  </section>

  <section id="qr" class="screen">
    <h2>📷 QR点検</h2>
    <p>QR機能は次のバージョンで追加します。</p>
    <button class="backBtn" onclick="showScreen('home')">🏠 ホームへ戻る</button>
  </section>

  <section id="manage" class="screen">
    <h2>⚙ 車両管理</h2>
    <div id="vehicleList"></div>
    <button class="backBtn" onclick="showScreen('home')">🏠 ホームへ戻る</button>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
