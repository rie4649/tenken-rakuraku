<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>車検データ一括登録（1回限り）</title>
<style>
body{font-family:Arial,"Hiragino Sans",sans-serif;margin:0;background:#eef3f8;color:#222}
.wrap{max-width:800px;margin:auto;padding:20px}
h1{text-align:center;font-size:24px;color:#1976d2}
p{text-align:center;color:#555}
table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;margin-bottom:20px}
th,td{padding:10px;text-align:center;font-size:14px;border-bottom:1px solid #eee} th{background:#1976d2;color:white}
.newTag{color:#ff9800;font-weight:bold;font-size:12px}
button{width:100%;padding:20px;border:none;border-radius:14px;background:#2e9d45;color:white;font-size:22px;font-weight:bold;margin-bottom:14px}
button:disabled{background:#999}
.backBtn{background:#555}
#msg{text-align:center;font-size:18px;font-weight:bold;margin:14px 0} </style> </head> <body> <div class="wrap">
<h1>🚗 車検データ 一括登録</h1>
<p>下の内容をFirebaseに登録します。内容を確認して、問題なければ下のボタンを押してください。</p>
<table>
<thead><tr><th>車両</th><th>車検満了日</th><th>備考</th></tr></thead>
<tbody id="list"></tbody>
</table>
<div id="msg"></div>
<button id="runBtn">この内容で登録する</button>
<button class="backBtn" onclick="location.href='index.html'">戻る</button>
</div>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={
apiKey:"AIzaSyA1GSV7KX6qMbIFIFz2ZhPNBVksiGxanKA",
authDomain:"tenken-rakuraku.firebaseapp.com",
databaseURL:"https://tenken-rakuraku-default-rtdb.firebaseio.com",
projectId:"tenken-rakuraku",
storageBucket:"tenken-rakuraku.firebasestorage.app",
messagingSenderId:"546571524606",
appId:"1:546571524606:web:dbe38f12c4b6ab4ad148af"
};
if(!firebase.apps.length){firebase.initializeApp(firebaseConfig);}
const db=firebase.database();

const shakenData={
"340":"2027-01-21",
"567":"2027-01-30",
"アームロール":"2027-01-26",
"6t":"2027-02-17",
"265":"2027-02-26",
"25tセルフ":"2027-03-02",
"6ヒアロング":"2027-02-23",
"5t":"2027-03-16",
"3tワイド":"2027-03-04",
"576":"2027-04-18",
"440":"2027-04-25",
"6ヒア":"2027-05-09",
"青パッカー":"2027-05-18",
"5ヒア":"2027-05-22",
"620":"2027-05-24",
"ヒノ8t":"2027-05-20",
"ツートン":"2027-05-09",
"3tパッカー":"2027-06-23",
"白パッカー":"2027-06-21",
"3ヒア":"2026-06-26",
"640":"2026-09-30",
"950":"2026-08-26",
"2.9":"2026-09-17",
"ヒノ":"2026-09-28",
"新10t":"2026-09-23",
"230":"2026-09-13",
"低クレ":"2026-10-07",
"いすゞ25t":"2026-09-09",
"8t":"2026-11-17",
"セルフ":"2027-01-08",
"3t":"2026-12-11",
"10t①":"2026-12-25",
"三菱ワイド":"2026-12-25"
};

const newVehicleCandidates=["6t","6ヒア","ヒノ","低クレ"];

const list=document.getElementById("list");
Object.keys(shakenData).forEach(function(name){
const tr=document.createElement("tr");
const isNew=newVehicleCandidates.indexOf(name)>=0;
tr.innerHTML="<td>"+name+"</td><td>"+shakenData[name]+"</td><td>"+(isNew?"<span class='newTag'>新規車両</span>":"")+"</td>";
list.appendChild(tr);
});

document.getElementById("runBtn").onclick=function(){
const btn=document.getElementById("runBtn");
btn.disabled=true;
btn.textContent="登録中...";

Promise.all([
db.ref("settings/vehicles").once("value"),
db.ref("settings/shaken").once("value")
]).then(function(results){
let vehicles=results[0].val()||[];
let shaken=results[1].val()||{};

Object.keys(shakenData).forEach(function(name){
if(vehicles.indexOf(name)===-1){
vehicles.push(name);
}
shaken[name]=shakenData[name];
});

return Promise.all([
db.ref("settings/vehicles").set(vehicles),
db.ref("settings/shaken").set(shaken)
]);
}).then(function(){
document.getElementById("msg").innerHTML="✅ 登録が完了しました。トップ画面の「車検満了日 一覧」で確認してください。";
btn.textContent="登録完了";
}).catch(function(err){
document.getElementById("msg").innerHTML="❌ 登録に失敗しました。通信を確認してもう一度お試しください。";
btn.disabled=false;
btn.textContent="この内容で登録する";
});
};
</script>
</body>
</html>
