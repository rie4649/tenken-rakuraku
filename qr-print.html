<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点検ラクラク QR印刷</title>
<style>
body{margin:0;padding:20px;font-family:Arial,sans-serif;background:white}
.printBtn{display:block;margin:20px auto;padding:16px 34px;font-size:22px;border:none;border-radius:12px;background:#1e5aa8;color:white;font-weight:bold}
.page{width:210mm;min-height:297mm;margin:auto;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;gap:8mm;page-break-after:always}
.card{border:2px solid #2b5b91;border-radius:14px;text-align:center;padding:12px;box-sizing:border-box}
.title{font-size:18px;font-weight:bold;color:#2b5b91;margin-bottom:8px}
.vehicle{font-size:30px;font-weight:bold;margin-bottom:15px}
.qr{width:150px;height:150px}
.note{font-size:14px;margin-top:12px;color:#333}
@media print{
 body{padding:0}
 .printBtn{display:none}
}
</style>
</head>
<body>

<button class="printBtn" onclick="window.print()">印刷する / PDF保存</button>

<div id="pages"></div>

<script>
const vehicles=[
"340","567","アームロール","いすゞ25t","265","25tセルフ",
"6ヒアロング","5t","3tワイド","576","440","青パッカー",
"5ヒア","620","ヒノ8t","ツートン","3tパッカー","白パッカー",
"3ヒア","640","950","2.9","ヒノ","10t①",
"230","8t","セルフ","3t","10t②","三菱ワイド","軽トラ"
];

const base="https://rie4649.github.io/tenken-rakuraku/qr.html?vehicle=";
const pages=document.getElementById("pages");

for(let i=0;i<vehicles.length;i+=6){
 const page=document.createElement("div");
 page.className="page";

 vehicles.slice(i,i+6).forEach(v=>{
   const url=base+encodeURIComponent(v);
   const qr="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data="+encodeURIComponent(url);

   page.innerHTML += `
   <div class="card">
     <div class="title">点検ラクラク QR</div>
     <div class="vehicle">${v}</div>
     <img class="qr" src="${qr}">
     <div class="note">読み込むとこの車両の点検画面が開きます</div>
   </div>`;
 });

 pages.appendChild(page);
}
</script>

</body>
</html>
