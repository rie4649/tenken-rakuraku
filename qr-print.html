<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点検ラクラク QR印刷</title>

<style>
body{
  margin:0;
  padding:20px;
  font-family:Arial, sans-serif;
  background:#fff;
}

.page{
  width:210mm;
  min-height:297mm;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  gap:8mm;
  page-break-after:always;
}

.card{
  border:2px solid #2b5b91;
  border-radius:14px;
  text-align:center;
  padding:12px;
  box-sizing:border-box;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
}

.title{
  color:#2b5b91;
  font-weight:bold;
  font-size:18px;
  margin-bottom:8px;
}

.vehicle{
  font-size:30px;
  font-weight:bold;
  margin-bottom:18px;
  min-height:38px;
}

.qr{
  width:145px;
  height:145px;
  margin-bottom:16px;
}

.note{
  font-size:14px;
  color:#333;
  line-height:1.5;
}

.printBtn{
  display:block;
  margin:20px auto;
  padding:14px 30px;
  font-size:20px;
  border:none;
  border-radius:12px;
  background:#2b5b91;
  color:white;
  font-weight:bold;
}

@media print{
  body{
    padding:0;
  }
  .printBtn{
    display:none;
  }
  .page{
    margin:0;
  }
}
</style>
</head>

<body>

<button class="printBtn" onclick="window.print()">印刷する / PDF保存</button>

<div id="pages"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<script>
const vehicles = [
  "340","567","アームロール","いすゞ25t","265","25tセルフ",
  "6ヒアロング","5t","3tワイド","576","440","青パッカー",
  "5ヒア","620","ヒノ8t","ツートン","3tパッカー","白パッカー",
  "3ヒア","640","950","2.9","ヒノ","10t①",
  "230","8t","セルフ","3t","10t②","三菱ワイド","軽トラ"
];

const baseUrl = "https://rie4649.github.io/tenken-rakuraku/qr.html?vehicle=";

const pages = document.getElementById("pages");

for(let i = 0; i < vehicles.length; i += 6){
  const page = document.createElement("div");
  page.className = "page";

  vehicles.slice(i, i + 6).forEach(vehicle => {
    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = "点検ラクラク QR";

    const name = document.createElement("div");
    name.className = "vehicle";
    name.textContent = vehicle;

    const canvas = document.createElement("canvas");
    canvas.className = "qr";

    const note = document.createElement("div");
    note.className = "note";
    note.textContent = "読み込むとこの車両の点検画面が開きます";

    card.appendChild(title);
    card.appendChild(name);
    card.appendChild(canvas);
    card.appendChild(note);
    page.appendChild(card);

    QRCode.toCanvas(canvas, baseUrl + encodeURIComponent(vehicle), {
      width:145,
      margin:1
    });
  });

  pages.appendChild(page);
}
</script>

</body>
</html>
