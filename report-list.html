<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>不具合報告一覧</title>
<link rel="stylesheet" href="style.css?v=112">
<style>
body{background:#eef3f8;padding-bottom:60px;font-family:Arial,"Hiragino Sans",sans-serif}
header{background:#e53935;color:white;padding:24px 10px;text-align:center}
header h1{font-size:32px;margin:0}
.backBtn{width:92%;max-width:780px;margin:16px auto;display:block;padding:16px;border:none;border-radius:16px;background:#555;color:white;font-size:20px;font-weight:bold}
.reportCard{background:white;margin:14px auto;padding:18px;border-radius:16px;max-width:780px;box-shadow:0 2px 8px rgba(0,0,0,.12);text-align:left}
.reportCard.done{opacity:.65}
.reportHead{display:flex;justify-content:space-between;align-items:center;font-size:18px;font-weight:bold;color:#333}
.reportBody{font-size:18px;margin:12px 0;white-space:pre-wrap;line-height:1.6;color:#222}
.statusBtn{width:100%;padding:14px;border:none;border-radius:12px;font-size:18px;font-weight:bold;color:white}
.statusBtn.notdone{background:#e53935}
.statusBtn.done{background:#2e9d45}
.empty{text-align:center;color:#888;font-size:18px;margin-top:40px}
.filterBar{max-width:780px;margin:14px auto;display:flex;gap:10px;justify-content:center}
.filterBar button{flex:1;padding:12px;border:none;border-radius:12px;font-size:16px;font-weight:bold;background:#ddd;color:#333}
.filterBar button.active{background:#1976d2;color:white}
</style>
</head>
<body>
<header><h1>🛠 不具合報告一覧</h1></header>
<button class="backBtn" onclick="location.href='index.html'">← ホームに戻る</button>
<div class="filterBar">
<button id="filterAll" class="active" onclick="setFilter('all')">すべて</button>
<button id="filterNotDone" onclick="setFilter('未対応')">未対応</button>
<button id="filterDone" onclick="setFilter('対応済')">対応済</button>
</div>
<div id="reportList"></div>

<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig={
apiKey:"AIzaSyA1GSV7KX6qMbIFIFz2ZhPNBVksiGxanKA",
authDomain:"tenken-rakuraku.firebaseapp.com",
databaseURL:"https://tenken-rakuraku-default-rtdb.firebaseio.com",
projectId:"tenken-rakuraku",
storageBucket:"tenken-rakuraku.firebasestorage.app",
messagingSenderId:"546571524606",
appId:"1:546571524606:web:dbe38f12c4b6ab4ad148af"
};
if(!firebase.apps.length){firebase.initializeApp(firebaseConfig);}
const db=firebase.database();

let allReports=[];
let currentFilter="all";

function setFilter(f){
currentFilter=f;
document.getElementById("filterAll").classList.toggle("active",f==="all");
document.getElementById("filterNotDone").classList.toggle("active",f==="未対応");
document.getElementById("filterDone").classList.toggle("active",f==="対応済");
render();
}

function toggleStatus(id,current){
if(current==="対応済"){
  db.ref("reports/"+id+"/status").set("未対応").then(loadReports);
  return;
}
if(!confirm("この報告を「対応済み」にすると一覧から完全に削除されます。よろしいですか？")){
  return;
}
db.ref("reports/"+id).remove().then(loadReports);
}

function escapeHtml(str){
return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function render(){
const list=document.getElementById("reportList");
list.innerHTML="";

let items=allReports.slice();
if(currentFilter!=="all"){
items=items.filter(function(r){return r.status===currentFilter;});
}

if(!items.length){
list.innerHTML="<div class='empty'>報告はありません</div>";
return;
}

items.forEach(function(r){
const card=document.createElement("div");
card.className="reportCard"+(r.status==="対応済"?" done":"");
card.innerHTML=
"<div class='reportHead'><span>📅 "+r.date+"　🚚 "+r.vehicle+"</span><span>👤"+(r.staff||"-")+"</span></div>"+
"<div class='reportBody'>"+escapeHtml(r.content||"")+"</div>"+
"<button class='statusBtn "+(r.status==="対応済"?"done":"notdone")+"' onclick='toggleStatus(\""+r.id+"\",\""+r.status+"\")'>"+
(r.status==="対応済"?"✅ 対応済":"⚠️ 未対応")+"</button>";
list.appendChild(card);
});
}

function loadReports(){
db.ref("reports").once("value").then(function(snap){
const val=snap.val()||{};
allReports=Object.keys(val).map(function(id){
const r=val[id];
r.id=id;
return r;
}).sort(function(a,b){return (b.createdAt||0)-(a.createdAt||0);});
render();
});
}

document.addEventListener("DOMContentLoaded",loadReports);
</script>
</body>
</html>
